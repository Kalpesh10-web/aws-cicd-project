version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 734300883105.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Build started
      - docker build -t myapp .
      - docker tag myapp:latest 734300883105.dkr.ecr.us-east-1.amazonaws.com/myapp:latest

  post_build:
    commands:
      - echo Pushing Docker image...
      - docker push 734300883105.dkr.ecr.us-east-1.amazonaws.com/myapp:latest
